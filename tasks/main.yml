---
- name: Validate that required variables are defined
  ansible.builtin.assert:
    that:
      - vfs_cache_mode is defined and vfs_cache_mode is string and vfs_cache_mode != ''
      - vfs_cache_max_size is defined and vfs_cache_max_size is string and vfs_cache_max_size != ''
    fail_msg: "Input validation failed. See README.md for information on required inputs and their format."
    success_msg: "User input configuration is valid."

- name: Verify Linux distribution
  ansible.builtin.assert:
    that:
      - ( ansible_facts['distribution'] == 'Rocky' and ansible_facts['distribution_major_version'] in ['9', '8']) or (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_major_version'] in ['24', '22'])
    fail_msg: "Supports RockyLinux 9, RockyLinux 8, Ubuntu 24 or Ubuntu 22. Detected: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }}"
    success_msg: "Running supported {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_major_version'] }} distribution."

- name: Install required packages (Ubuntu)
  ansible.builtin.apt:
    name:
      - "{{ item }}"
    state: present
    allow_downgrade: false
  loop:
    - fuse3
    - fuse-overlayfs
    - curl
    - unzip
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install required packages (RockyLinux)
  ansible.builtin.dnf:
    name:
      - "{{ item }}"
    state: present
    allow_downgrade: false
  loop:
    - fuse3
    - fuse-overlayfs
    - curl
    - unzip
  when: ansible_facts['distribution'] == 'Rocky'

- name: Validate fuse3 is available and functional
  ansible.builtin.command: fusermount3 -V
  changed_when: false
  register: fusermount_check
  failed_when: fusermount_check.rc != 0

- name: Create fusermount3 symlink
  ansible.builtin.file:
    src: /usr/bin/fusermount3
    dest: /usr/bin/fusermount
    state: link
    mode: '0755'
  when:
    - fusermount_check.stdout is defined
    - "'fusermount3' not in fusermount_check.stdout"

- name: Initialize internal nobs for rclond installation
  ansible.builtin.set_fact:
    rclone_version: "1.73.3"
    rclone_config_name: "eumetsat-data-buckets"
    rclone_nonsecret_config_file: /etc/eum_data_bucket_mount_credentials
    rclone_cache_dir: "/var/cache/rclone"

- name: Determine rclone download URLs and checksum
  ansible.builtin.set_fact:
    rclone_download_base: "https://downloads.rclone.org/v{{ rclone_version }}"
    rclone_zip_file: "rclone-v{{ rclone_version }}-linux-amd64.zip"
    rclone_checksum_url: "https://downloads.rclone.org/v{{ rclone_version }}/SHA256SUMS"
    rclone_binary_path: "/usr/bin/rclone"

- name: Download rclone SHA256 checksum file
  ansible.builtin.get_url:
    url: "{{ rclone_checksum_url }}"
    dest: "/tmp/rclone-SHA256SUMS-{{ rclone_version }}"
    mode: '0644'
    force: true
  register: checksum_download

- name: Extract expected SHA256 checksum for linux-amd64 zip
  ansible.builtin.shell: |
    set -o pipefail
    grep -E 'linux-amd64\.zip$' /tmp/rclone-SHA256SUMS-{{ rclone_version }} | awk '{print $1}'
  args:
    executable: /bin/bash
  register: rclone_expected_checksum
  changed_when: true

- name: Download rclone zip archive
  ansible.builtin.get_url:
    url: "{{ rclone_download_base }}/{{ rclone_zip_file }}"
    dest: "/tmp/{{ rclone_zip_file }}"
    checksum: "sha256:{{ rclone_expected_checksum.stdout | trim }}"
    mode: '0644'
  register: zip_download

- name: Unarchive rclone zip
  ansible.builtin.unarchive:
    src: "/tmp/{{ rclone_zip_file }}"
    dest: "/tmp/"
    remote_src: true
    creates: "/tmp/rclone-v{{ rclone_version }}-linux-amd64/rclone"
  when: zip_download.changed
  notify: Clean up temporary rclone files

- name: Install rclone binary to /usr/bin
  ansible.builtin.copy:
    src: "/tmp/rclone-v{{ rclone_version }}-linux-amd64/rclone"
    dest: "{{ rclone_binary_path }}"
    mode: '0755'
    owner: root
    group: root
    remote_src: true
  register: rclone_installed
  notify: Clean up temporary rclone files

- name: Create mount.rclone symlink
  ansible.builtin.file:
    src: "{{ rclone_binary_path }}"
    dest: /sbin/mount.rclone
    state: link
    mode: '0755'

- name: Fill in rclone configuration access to EUMETSAT S3 buckets (publicly available within the EWC)
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: '{{ rclone_nonsecret_config_file }}'
    mode: '0644'
    owner: root
    group: root

- name: Stat per-bucket mount points to detect active FUSE mounts
  ansible.builtin.stat:
    path: /etc/fuse.conf
  register: fuse_conf_stat

- name: Create /etc/fuse.conf
  ansible.builtin.file:
    path: /etc/fuse.conf
    state: touch
    mode: '0644'
    owner: root
    group: root
  when: not fuse_conf_stat.stat.exists

- name: Enable user_allow_other in /etc/fuse.conf
  ansible.builtin.lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?\s*user_allow_other'
    line: 'user_allow_other'
    state: present
    mode: '0644'
  register: fuse_conf_updated

- name: Create main EUMETSAT data mount root directory
  ansible.builtin.file:
    path: "/mnt/eumetsatdata"
    state: directory
    mode: '0555'
    owner: root
    group: root

- name: Stat per-bucket mount points to detect active FUSE mounts
  ansible.builtin.stat:
    path: "{{ eumetsat_mount_root }}/{{ item.dest }}"
  register: bucket_stat
  loop: "{{ buckets }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Create per-bucket mount directories (read-only for all users)
  ansible.builtin.file:
    path: "{{ item.item.dest }}"
    state: directory
    mode: '0555'
    owner: root
    group: root
  loop: "{{ bucket_stat.results }}"
  when: (not item.stat.exists) or (item.stat.exists and item.stat.writeable)
  loop_control:
    label: "{{ item.item.dest }}"

- name: Create canonical rclone cache directory
  ansible.builtin.file:
    path: "{{ rclone_cache_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Validate cache directory permissions are strict (re-apply if needed)
  ansible.builtin.file:
    path: "{{ rclone_cache_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  when: not ansible_check_mode

- name: Template systemd .mount units (one per bucket)
  ansible.builtin.template:
    src: mount-unit.j2
    dest: "/etc/systemd/system/mnt-eumetsatdata-{{ item.dest }}.mount"
    mode: '0644'
    owner: root
    group: root
  loop: "{{ buckets }}"
  loop_control:
    label: "{{ item.dest }}"
  notify: Restart mount units
  register: mount_units_templated

- name: Validate generated systemd mount units
  ansible.builtin.command: systemd-analyze verify "mnt-eumetsatdata-{{ item.dest }}.mount"
  changed_when: false
  loop: "{{ buckets }}"
  register: unit_validation
  loop_control:
    label: "{{ item.dest }}"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - mount_units_templated is changed

- name: Enable and start .mount units
  ansible.builtin.systemd:
    name: "mnt-eumetsatdata-{{ item.dest }}.mount"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ buckets }}"
  register: mount_start
  loop_control:
    label: "{{ item.dest }}"

- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

- name: List installed package versions (RockyLinux)
  ansible.builtin.debug:
    msg:
      - "fuse3: {{ ansible_facts.packages['fuse3'][0].version }}-{{ ansible_facts.packages['fuse3'][0].release }}"
      - "curl: {{ ansible_facts.packages['curl'][0].version }}-{{ ansible_facts.packages['curl'][0].release }}"
      - "fuse-overlayfs: {{ ansible_facts.packages['fuse-overlayfs'][0].version }}-{{ ansible_facts.packages['fuse-overlayfs'][0].release }}"
      - "unzip: {{ ansible_facts.packages['unzip'][0].version }}-{{ ansible_facts.packages['unzip'][0].release }}"
      - "rclone: {{ rclone_version }}"
  when: ansible_facts['distribution'] == 'Rocky'

- name: List installed package versions (Ubuntu)
  ansible.builtin.debug:
    msg:
      - "fuse3: {{ ansible_facts.packages['fuse3'][0].version }}"
      - "curl: {{ ansible_facts.packages['curl'][0].version }}"
      - "fuse-overlayfs: {{ ansible_facts.packages['fuse-overlayfs'][0].version }}"
      - "unzip: {{ ansible_facts.packages['unzip'][0].version }}"
      - "rclone: {{ rclone_version }}"
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Temporary setup Trivy for SBOM auto-generation (standalone binary file at /tmp/trivy)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp
    creates: /tmp/trivy
  args:
    executable: /bin/bash

- name: Auto-generate SBOM (SPDX file at /sbom.json)
  ansible.builtin.command:
    cmd: ./trivy rootfs --pkg-types os --format spdx-json --output /sbom.json --scanners vuln /
    chdir: /tmp
  changed_when: true

- name: Display S3 bucket mounting status
  ansible.builtin.debug:
    msg: Successfully mounted {{ buckets | length }} bucket(s) under the /mnt directory
